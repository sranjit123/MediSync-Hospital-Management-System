{% extends 'recommendation/shared/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'recommendation/styles/shared.css' %}">

<div class="page-center" style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 40px 20px;">
    <div class="card" style="width: 100%; max-width: 600px; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2 style="text-align: center; color: #1e293b; margin-bottom: 10px;">Join as a Doctor</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Manage your appointments and patients efficiently</p>

        <form method="post" enctype="multipart/form-data" id="signup-form" onsubmit="return validateSignup()">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label for="full_name" style="display: block; margin-bottom: 5px; font-weight: 500;">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Dr. John Doe" 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>

                <div class="input-group">
                    <label for="username" style="display: block; margin-bottom: 5px; font-weight: 500;">Username</label>
                    <input type="text" id="username" name="username" required onblur="checkUsername()" 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    <p id="username-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 5px; display: none;">Username is already taken.</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                <div class="input-group">
                    <label for="email" style="display: block; margin-bottom: 5px; font-weight: 500;">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="doctor@hospital.com" 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>

                <div class="input-group">
                    <label for="password" style="display: block; margin-bottom: 5px; font-weight: 500;">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                <div class="input-group">
                    <label for="department" style="display: block; margin-bottom: 5px; font-weight: 500;">Department</label>
                    <select id="department" name="department" required 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: white;">
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label for="specialization" style="display: block; margin-bottom: 5px; font-weight: 500;">Specialization</label>
                    <input type="text" id="specialization" name="specialization" required placeholder="e.g. Cardiologist" 
                        style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label for="availability" style="display: block; margin-bottom: 5px; font-weight: 500;">Working Hours (Availability)</label>
                <textarea id="availability" name="availability" required rows="2" 
                    placeholder="e.g. Mon-Fri 09:00-17:00"
                    style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;"></textarea>
                <small style="color: #64748b;">Format example: Mon-Fri 09:00-17:00</small>
            </div>

            <div class="input-group" style="margin-top: 15px; margin-bottom: 25px;">
                <label for="image" style="display: block; margin-bottom: 5px; font-weight: 500;">Profile Picture</label>
                <input type="file" id="image" name="image" accept="image/*" 
                    style="width: 100%; padding: 8px; border: 1px dashed #cbd5e1; border-radius: 8px;">
            </div>

            <button type="submit" class="btn" style="background: #4f46e5; width: 100%; border: none; padding: 1rem; color: white; border-radius: 0.5rem; font-weight: 600; font-size: 1rem; cursor: pointer;">
                Register as Doctor
            </button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <p style="color: #64748b;">Already have an account? <a href="{% url 'login' %}" style="color: #4f46e5; font-weight: 600; text-decoration: none;">Login</a></p>
        </div>
    </div>
</div>

<script>
    function checkUsername() {
        const username = document.getElementById('username').value;
        const errorP = document.getElementById('username-error');
        if (username.length < 3) return;

        fetch(`/check_username/?username=${username}`)
            .then(response => response.json())
            .then(data => {
                if (data.is_taken) {
                    errorP.style.display = 'block';
                } else {
                    errorP.style.display = 'none';
                }
            });
    }

    function validateSignup() {
        const p = document.getElementById('password').value;
        if (p.length < 8) {
            alert('Password must be at least 8 characters.');
            return false;
        }
        return true;
    }
</script>
{% endblock %}
